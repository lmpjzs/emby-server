apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: emby-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/lmpjzs/emby-server"
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
